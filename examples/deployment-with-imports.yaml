name: Web Application Deployment with Step Composition
version: 1.0.0
description: Deploy web application using inline step composition
author: SRE Team
category: deployment

environments:
  - name: staging
    description: Staging environment
    variables:
      CLUSTER: staging-k8s
      NAMESPACE: staging
      REPLICAS: 2
      DB_HOST: staging-db.example.com
      DB_USER: app_user
      DB_NAME: app_database
      DB_PASSWORD: staging_password
      REDIS_HOST: staging-redis.example.com
      API_ENDPOINT: https://api-staging.example.com
      FRONTEND_URL: https://staging.example.com
      IMAGE_NAME: myregistry/webapp
      VERSION: "1.2.3"
      DEPLOYMENT_NAME: webapp
      CONTAINER_NAME: webapp
      K8S_MANIFESTS_DIR: ./k8s/staging
      BUILD_CONTEXT: .
      APP_DIR: ./app
    approval_required: false

  - name: production
    description: Production environment
    variables:
      CLUSTER: prod-k8s
      NAMESPACE: production
      REPLICAS: 5
      DB_HOST: prod-db.example.com
      DB_USER: app_user
      DB_NAME: app_database
      DB_PASSWORD: prod_password
      REDIS_HOST: prod-redis.example.com
      API_ENDPOINT: https://api.example.com
      FRONTEND_URL: https://example.com
      IMAGE_NAME: myregistry/webapp
      VERSION: "1.2.3"
      DEPLOYMENT_NAME: webapp
      CONTAINER_NAME: webapp
      K8S_MANIFESTS_DIR: ./k8s/production
      BUILD_CONTEXT: .
      APP_DIR: ./app
    approval_required: true

preflight:
  - name: Check Git Status
    type: command
    command: git status --porcelain
    description: Ensure working directory is clean

  - name: Check Docker
    type: command
    command: docker version
    description: Verify Docker is available

steps:
  # Expand all database steps inline
  - uses: ./common/database-steps.yaml

  # Custom step specific to this operation
  - name: update-config-map
    type: automatic
    description: Update application configuration
    command: |
      kubectl create configmap app-config \
        --from-literal=api_endpoint=${API_ENDPOINT} \
        --from-literal=db_host=${DB_HOST} \
        --from-literal=redis_host=${REDIS_HOST} \
        --context ${CLUSTER} -n ${NAMESPACE} \
        --dry-run=client -o yaml | kubectl apply -f -
    timeout: 30
    evidence_required: true
    evidence_types: ["command_output"]

  # Expand all Kubernetes steps inline
  - uses: ./common/kubernetes-steps.yaml

  # Health checks with variables
  - uses: ./common/health-checks.yaml
    with:
      API_ENDPOINT: ${API_ENDPOINT}
      FRONTEND_URL: ${FRONTEND_URL}

metadata:
  created_at: "2024-01-20T10:00:00Z"
  updated_at: "2024-01-20T15:30:00Z"
