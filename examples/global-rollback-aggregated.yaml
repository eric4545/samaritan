name: Global Rollback (Aggregated)
version: 1.0.0
description: |
  Demonstrates `rollback.aggregate_step_rollbacks: true` — the global rollback
  GROUPS every step's own `rollback` after the explicit plan steps, in reverse
  step order (the most-recently-completed step's rollback first). This lets you
  author each undo next to the step it reverses while still seeing — and, during
  `samaritan run`, jumping to and running — one consolidated recovery via [g].
  In the generated manuals the per-step rollbacks are also CENTRALIZED: each
  step's inline rollback becomes a jump-link into its entry in the bottom
  Rollback Plan, and the duplicate Rollback Procedures section is dropped.

environments:
  - name: staging
    description: Staging environment
    variables:
      NAMESPACE: web-staging
  - name: production
    description: Production environment
    variables:
      NAMESPACE: web-prod

steps:
  - name: Create database backup
    type: manual
    phase: preflight
    instruction: Snapshot the database before any changes.
    command: pg_dump -n ${NAMESPACE} > backup.sql
    # Co-located undo for THIS step.
    rollback:
      - name: Discard the backup snapshot
        command: rm -f backup.sql

  - name: Deploy web server
    type: automatic
    phase: flight
    command: kubectl apply -f deployment.yaml -n ${NAMESPACE}
    expect:
      contains: deployment.apps/web-server
    rollback:
      - name: Roll back web server
        instruction: Undo this step's deployment in order.
        sub_steps:
          - command: kubectl rollout undo deployment/web-server -n ${NAMESPACE}
          - instruction: Confirm the previous ReplicaSet is serving traffic.
            expect:
              contains: rolled back

  - name: Scale up canary
    type: automatic
    phase: flight
    command: kubectl scale deployment/web-canary --replicas=3 -n ${NAMESPACE}
    rollback:
      - name: Scale canary back down
        command: kubectl scale deployment/web-canary --replicas=0 -n ${NAMESPACE}

# Group every step's rollback into this global plan. The explicit step below
# runs first, then each step's own rollback in reverse order (Scale up canary →
# Deploy web server → Create database backup).
rollback:
  automatic: false
  aggregate_step_rollbacks: true
  conditions:
    - health_check_failure
    - error_rate_spike
  steps:
    - name: Page the on-call SRE
      instruction: Notify the on-call engineer before executing the rollback.
