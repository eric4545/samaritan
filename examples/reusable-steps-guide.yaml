# ============================================================
# SAMARITAN — Reusable Steps Guide
# ============================================================
# This file demonstrates all the ways to reuse steps across
# operations using the `template:` directive.
#
# Three template sources are supported:
#
#   1. Local file (relative path)
#      template: ./templates/health-checks.yaml
#
#   2. HTTPS URL
#      template: https://example.com/ops-templates/health-checks.yaml
#
#   3. GitHub shorthand  github:owner/repo//path@ref
#      template: github:myorg/ops-templates//health-checks.yaml@v2.1.0
#      template: github:myorg/ops-templates//health-checks.yaml@abc1234
#      template: github:myorg/ops-templates//health-checks.yaml@main
#
# Variables are passed via `with:` and substituted for every
# ${VAR} placeholder found inside the template file.
# ============================================================

name: Reusable Steps Guide
version: 1.0.0
description: Reference showing every template import pattern

environments:
  - name: staging
    description: Staging environment
    variables:
      ENDPOINT: https://staging-api.example.com
      DB_HOST: staging-db.example.com
      SERVICE_NAME: my-service-staging
      NAMESPACE: staging
      IMAGE_TAG: latest
      REPLICAS: 2
      SLACK_WEBHOOK: https://hooks.slack.com/services/STAGING
      EMAIL_RECIPIENTS: team@example.com
    approval_required: false

  - name: production
    description: Production environment
    variables:
      ENDPOINT: https://api.example.com
      DB_HOST: prod-db.example.com
      SERVICE_NAME: my-service-prod
      NAMESPACE: production
      IMAGE_TAG: v1.2.3
      REPLICAS: 10
      SLACK_WEBHOOK: https://hooks.slack.com/services/PROD
      EMAIL_RECIPIENTS: team@example.com,oncall@example.com
    approval_required: true

steps:
  # ----------------------------------------------------------
  # Pattern 1: Local template — relative path
  # The path is resolved relative to this operation file.
  # Templates can be either:
  #   - An array of steps  (health-checks.yaml below)
  #   - A full operation file with a top-level `steps:` field
  #     (kubernetes-deployment.yaml below)
  # ----------------------------------------------------------
  - name: Pre-deployment Checks (local template)
    template: ./templates/health-checks.yaml
    with:
      ENDPOINT: ${ENDPOINT}      # pass env var through unchanged
      DB_HOST: ${DB_HOST}
      SERVICE_NAME: ${SERVICE_NAME}
      TIMEOUT: 60                # literal value
      RETRIES: 3

  # ----------------------------------------------------------
  # Pattern 2: Same template, different parameters
  # DRY: one template, multiple import sites with different
  # `with:` values produce independent, fully substituted steps.
  # ----------------------------------------------------------
  - name: Post-deployment Checks (same template, stricter timeouts)
    template: ./templates/health-checks.yaml
    with:
      ENDPOINT: ${ENDPOINT}
      DB_HOST: ${DB_HOST}
      SERVICE_NAME: ${SERVICE_NAME}
      TIMEOUT: 120               # higher timeout after deploy
      RETRIES: 10

  # ----------------------------------------------------------
  # Pattern 3: Operation-format template
  # Template is a full YAML operation file.
  # The parser extracts its `steps:` array automatically.
  # ----------------------------------------------------------
  - name: Deploy to Kubernetes (operation-format template)
    template: ./templates/kubernetes-deployment.yaml
    with:
      SERVICE_NAME: ${SERVICE_NAME}
      NAMESPACE: ${NAMESPACE}
      IMAGE_TAG: ${IMAGE_TAG}
      REPLICAS: ${REPLICAS}

  # ----------------------------------------------------------
  # Pattern 4: Template with no variables
  # If the template has no ${VAR} placeholders, `with:` is
  # optional and can be omitted entirely.
  # ----------------------------------------------------------
  - name: Request Approval (no-variable template)
    template: ./templates/approval-gate.yaml

  # ----------------------------------------------------------
  # Pattern 5: HTTPS URL template
  # Fetched at parse time; the content is cached in-memory so
  # multiple imports of the same URL make only one request.
  # Pin to a specific URL path to control the version.
  # ----------------------------------------------------------
  # Uncomment to use (requires network access):
  # - name: HTTPS Remote Template Example
  #   template: https://raw.githubusercontent.com/myorg/ops-templates/v2.0.0/health-checks.yaml
  #   with:
  #     ENDPOINT: ${ENDPOINT}
  #     DB_HOST: ${DB_HOST}
  #     SERVICE_NAME: ${SERVICE_NAME}
  #     TIMEOUT: 60
  #     RETRIES: 3

  # ----------------------------------------------------------
  # Pattern 6: GitHub shorthand  github:owner/repo//path@ref
  # Expanded to:
  #   https://raw.githubusercontent.com/{owner}/{repo}/{ref}/{path}
  #
  # @ref can be:
  #   - A semver tag:   @v2.1.0
  #   - A commit hash:  @abc1234
  #   - A branch name:  @main  (or omit @ref — defaults to main)
  #
  # The // separator is required to split repo from file path.
  # ----------------------------------------------------------
  # Uncomment to use (requires network access):
  # - name: GitHub Shorthand Template (pinned to tag)
  #   template: github:myorg/ops-templates//deploy/health-checks.yaml@v2.1.0
  #   with:
  #     ENDPOINT: ${ENDPOINT}
  #     DB_HOST: ${DB_HOST}
  #     SERVICE_NAME: ${SERVICE_NAME}
  #     TIMEOUT: 60
  #     RETRIES: 3

  # - name: GitHub Shorthand Template (pinned to commit hash)
  #   template: github:myorg/ops-templates//deploy/health-checks.yaml@abc1234def5678
  #   with:
  #     ENDPOINT: ${ENDPOINT}
  #     DB_HOST: ${DB_HOST}
  #     SERVICE_NAME: ${SERVICE_NAME}
  #     TIMEOUT: 60
  #     RETRIES: 3

  # ----------------------------------------------------------
  # Pattern 7: Notifications template (operation format, remote-ready)
  # ----------------------------------------------------------
  - name: Notify Team
    template: ./templates/notifications.yaml
    with:
      SLACK_WEBHOOK: ${SLACK_WEBHOOK}
      MESSAGE: "Deployment of ${SERVICE_NAME}:${IMAGE_TAG} to ${NAMESPACE} completed"
      EMAIL_RECIPIENTS: ${EMAIL_RECIPIENTS}
      EMAIL_SUBJECT: "Deploy complete: ${SERVICE_NAME} ${IMAGE_TAG}"
