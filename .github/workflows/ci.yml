name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DEFAULT_NODE_VERSION: '24.x'

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x, 26.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Test CLI commands
      run: |
        npm start -- --help
        npm start -- validate examples/deployment.yaml
        npm start -- generate manual examples/deployment.yaml -o /tmp/test-manual.md

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-results-${{ matrix.node-version }}
        path: |
          coverage/
          test-results.xml

  test-bun:
    name: Test (Bun)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install

    - name: Run tests
      run: bun run test

    - name: Test CLI commands
      run: |
        bun run start -- --help
        bun run start -- validate examples/deployment.yaml
        bun run start -- generate manual examples/deployment.yaml -o /tmp/test-manual.md

  e2e:
    name: E2E (real tmux)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.DEFAULT_NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install tmux
      run: sudo apt-get update && sudo apt-get install -y tmux

    - name: Verify tmux is available
      run: tmux -V

    # SAMARITAN_E2E_REQUIRE_TMUX=1 makes the suite FAIL (not silently skip) if
    # tmux is ever missing, so a broken sidecar path can't slip through here.
    - name: Run sidecar e2e tests (real tmux)
      run: npm run test:e2e
      env:
        SAMARITAN_E2E_REQUIRE_TMUX: '1'

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.DEFAULT_NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linting
      run: npx @biomejs/biome check .

  validate-examples:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.DEFAULT_NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Validate all examples
      run: |
        for file in examples/*.yaml; do
          echo "Validating $file"
          npm start -- validate "$file" --strict
        done

    - name: Test manual generation for all examples
      run: |
        for file in examples/*.yaml; do
          echo "Generating manual for $file"
          npm start -- generate manual "$file" -o "/tmp/$(basename "$file" .yaml)-manual.md"
        done

    - name: Test postmortem generation for all postmortem examples
      run: |
        for file in examples/postmortems/*.yaml; do
          echo "Generating postmortem for $file"
          npm start -- generate postmortem "$file" -o "/tmp/$(basename "$file" .yaml)-pm.md"
          npm start -- generate postmortem "$file" -f confluence -o "/tmp/$(basename "$file" .yaml)-pm.confluence"
          npm start -- generate postmortem "$file" -f adf -o "/tmp/$(basename "$file" .yaml)-pm.json"
        done

  security:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.DEFAULT_NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit --audit-level=moderate

    - name: Check for vulnerabilities
      run: npx audit-ci --moderate

  build-test:
    name: Test Build Process
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.DEFAULT_NODE_VERSION }}

    - name: Install dependencies
      run: npm ci

    - name: Run build
      run: npm run build

    - name: Test built CLI works
      run: |
        echo "Testing CLI commands from dist/ folder"
        node dist/cli/index.js --help
        node dist/cli/index.js validate examples/deployment.yaml
        node dist/cli/index.js schema --help
        node dist/cli/index.js schema -o /tmp/schema.json
        echo "✅ All commands work after build"

    - name: Verify dist folder was created
      run: |
        if [ ! -d "dist" ]; then
          echo "❌ ERROR: dist/ folder not created during build"
          exit 1
        fi
        if [ ! -f "dist/cli/index.js" ]; then
          echo "❌ ERROR: dist/cli/index.js not found"
          exit 1
        fi
        if [ ! -f "dist/cli/commands/schema.js" ]; then
          echo "❌ ERROR: dist/cli/commands/schema.js not found"
          exit 1
        fi
        echo "✅ All required files present in dist/"