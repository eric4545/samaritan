name: Announce and Deploy
version: 1.0.0
description: Operation to test multi-line description rendering.

environments:
  - name: staging
    variables:
      ANNOUNCE_CHANNEL: '#staging-ops'
      BUDDY: '@sre-lead'

preflight:
  - name: announce
    type: manual
    description: |
      Post to ${ANNOUNCE_CHANNEL}:

        <!here>
        [Summary] my operation
        [Buddy] ${BUDDY}

      Capture thread timestamp before proceeding.
    command: |
      ANNOUNCE_THREAD_TS=__ANNOUNCE_THREAD_TS__

steps:
  - name: Deploy App
    type: manual
    description: Single-line step description
    instruction: Apply the deployment manifest.
