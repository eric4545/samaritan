name: Announce and Deploy
version: 1.0.0
description: Operation with preflight instruction and pre-fenced command.

environments:
  - name: dev
    variables:
      ANNOUNCE_CHANNEL: '#dev-ops'

steps:
  - name: announce
    type: manual
    phase: preflight
    description: Post announcement
    instruction: |
      Post to ${ANNOUNCE_CHANNEL}:
      ```
      <!here>
      [Summary] my operation
      ```
      Capture thread timestamp before proceeding.

  - name: socks-proxy
    type: manual
    phase: preflight
    description: Open SOCKS proxy
    command: |
      ```bash
      ssh -D 6666 user@access.dev.rpsp.jp
      ```

  - name: Deploy App
    type: automatic
    command: kubectl apply -f deployment.yaml
